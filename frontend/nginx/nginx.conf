server {
    listen 80;

    # Root location (React application files)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Yeh React Router (single page app) ke liye zaroori hai
        try_files $uri $uri/ /index.html;
    }

    # API Proxy: Backend ko address karta hai
    location /api/ {
        # IMPORTANT: Container name use ho raha hai, kyunki dono container ek hi network mein honge
        proxy_pass http://ml-api-backend:5000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300; # Timeout badha diya gaya hai (ML calculations ke liye)
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}